<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>
  <main id="playing-cards">
    <div class="card">
      <div class="left">
        <span>1</span>
        <span>♠</span>
      </div>
      <div class="middle">♠</div>
      <div class="right">
        <span>1</span>
        <span>♠</span>
      </div>
    </div>
    <div class="card">
      <div class="left">
        <span>2</span>
        <span>♣</span>
      </div>
      <div class="middle">
        <span>♣</span>
        <span class="updown">♣</span>
      </div>
      <div class="right">
        <span>2</span>
        <span>♣</span>
      </div>
    </div>
    <div class="card red">
      <div class="left">
        <span>4</span>
        <span>♥</span>
      </div>
      <div class="middle">
        <span>♥</span>
        <span>♥</span>
        <span class="ud">♥</span>
        <span class="ud">♥</span>
      </div>
      <div class="right">
        <span>4</span>
        <span>♥</span>
      </div>
    </div>
  </main>
</body>

</html>
