<!DOCTYPE html>

<head>

            <span></span>
          </span>
        </td>
      </tr>

        <td>
          <span class="rate">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </td>
      </tr>
      <tr class="to-read">
        <td>To Sell Is Human</td>
        <td>Daniel H. Pink</td>
        <td>Psychological, Self-help, Business, Economics</td>
        <td>

        <td>
          <span class="rate">
            <span></span>

            <span></span>
          </span>
        </td>

    </tbody>
  </table>
</body>

</html>
